<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>맛집 | M-TR</title>
  <link rel="stylesheet" href="./style.css?v=30">
</head>
<body>

  <main class="food-page">

    <header class="food-header">
      <a href="index.html" class="back-link">← Home</a>
      <p>SUZHOU RESTAURANT</p>
      <h1>맛집 기록</h1>
      <span>쑤저우에서 가보고 싶은 곳과 좋았던 식당을 모아두는 공간</span>
    </header>

    <section class="restaurant-card">

      <div class="restaurant-photo">
        <img src="images/restaurant1.jpg" alt="맛집 대표사진">
      </div>

      <div class="restaurant-info">
        <p class="restaurant-tag">RESTAURANT 01</p>

        <h2 id="restaurantName">가게 이름을 입력하세요</h2>

        <div class="info-block">
          <strong>대표메뉴</strong>
          <p id="restaurantMenu">샤오롱바오 · 우육면 · 볶음밥</p>
        </div>

        <div class="info-block">
          <strong>주소</strong>
          <p id="restaurantAddress">苏州市 工业园区 예시주소</p>
        </div>

        <div class="button-grid">
          <button onclick="copyText('restaurantName')">이름 복사</button>
          <button onclick="copyText('restaurantAddress')">주소 복사</button>
          <a id="mapLink" href="#" target="_blank">지도 열기</a>
        </div>
      </div>

    </section>

  </main>

  <script>
    const restaurantName = document.getElementById("restaurantName").innerText;
    const restaurantAddress = document.getElementById("restaurantAddress").innerText;
    const mapQuery = encodeURIComponent(restaurantName + " " + restaurantAddress);

    document.getElementById("mapLink").href =
      "https://maps.apple.com/?q=" + mapQuery;

    function copyText(id) {
      const text = document.getElementById(id).innerText;

      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(function () {
          alert("복사됐어요!");
        });
      } else {
        const tempInput = document.createElement("textarea");
        tempInput.value = text;
        document.body.appendChild(tempInput);
        tempInput.select();
        document.execCommand("copy");
        document.body.removeChild(tempInput);
        alert("복사됐어요!");
      }
    }
  </script>

</body>
</html>
