<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 통역 mobile verM6</title>

<style>
body{
  background:#000;
  color:#fff;
  font-family:Arial, sans-serif;
  margin:0;
}

#header{
  position:fixed;
  top:12px;
  left:12px;
  right:12px;
  z-index:10;
}

#title{
  font-size:18px;
  font-weight:bold;
}

#version{
  color:#00FF9C;
  margin-left:6px;
}

#status{
  margin-top:8px;
  font-size:15px;
  color:#ddd;
}

#controls{
  margin-top:12px;
  display:flex;
  gap:8px;
}

#controls button{
  flex:1;
  font-size:22px;
  padding:16px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

#listenBtn{
  background:#00FF9C;
  color:#000;
}

#clearBtn{
  background:#555;
  color:#fff;
}

#subtitleBox{
  position:absolute;
  top:125px;
  bottom:0;
  left:0;
  right:0;
  overflow-y:auto;
  padding:16px;
  box-sizing:border-box;
  text-align:center;
}

.subtitle{
  font-size:32px;
  color:#00FF9C;
  font-weight:bold;
  max-width:95%;
  margin:14px auto;
  line-height:1.45;
  word-break:keep-all;
  white-space:pre-line;
}
</style>
</head>

<body>

<div id="header">
  <div id="title">
    🎤 AI 통역 <span id="version">verM6</span>
  </div>

  <div id="status">대기중</div>

  <div id="controls">
    <button id="listenBtn" onclick="listenOnce()">듣기</button>
    <button id="clearBtn" onclick="clearSubtitle()">초기화</button>
  </div>
</div>

<div id="subtitleBox"></div>

<script>
let recognition = null;
let busy = false;
let lastSentence = "";

const MAX_SUBTITLES = 4;
const MIN_SENTENCE_LENGTH = 2;

function setStatus(text){
  document.getElementById("status").innerText = text;
}

function cleanText(text){
  return text
    .replace(/^(啊|嗯|哦|这个|那个|然后|所以|就是|음|아|어|그|저기)+/g, "")
    .replace(/[.,!?。，！？…—-]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

function splitSentence(text){
  if(text.length > 22){
    text = text.replace(/(그리고|하지만|그래서|또|또한)/g, "\n$1");
  }
  return text;
}

function getSpeechClass(){
  return window.SpeechRecognition || window.webkitSpeechRecognition;
}

function listenOnce(){
  if(busy) return;

  const SpeechRecognitionClass = getSpeechClass();

  if(!SpeechRecognitionClass){
    setStatus("음성인식 미지원");
    return;
  }

  recognition = new SpeechRecognitionClass();
  recognition.lang = "zh-CN";
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = function(){
    setStatus("듣는 중");
  };

  recognition.onresult = async function(event){
    let sentence = event.results[0][0].transcript;
    sentence = cleanText(sentence);

    setStatus("인식됨: " + sentence);

    if(sentence.length < MIN_SENTENCE_LENGTH){
      setStatus("너무 짧음");
      return;
    }

    if(sentence === lastSentence){
      setStatus("중복 문장");
      return;
    }

    lastSentence = sentence;
    await translateAndShow(sentence);
  };

  recognition.onerror = function(e){
    console.log("speech error:", e.error);

    if(e.error === "not-allowed"){
      setStatus("마이크 권한 필요");
      return;
    }
    if(e.error === "audio-capture"){
      setStatus("마이크 확인");
      return;
    }
    if(e.error === "no-speech"){
      setStatus("말이 없음");
      return;
    }
    setStatus("다시 시도");
  };

  recognition.onend = function(){
    if(!busy && document.getElementById("status").innerText === "듣는 중"){
      setStatus("대기중");
    }
  };

  try{
    recognition.start();
  }catch(e){
    setStatus("시작 실패");
  }
}

async function translateAndShow(text){
  busy = true;
  setStatus("번역중");

  try{
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=zh-CN&tl=ko&dt=t&q=${encodeURIComponent(text)}`;
    const res = await fetch(url);
    const data = await res.json();

    let translated = data?.[0]?.map(item => item[0]).join("") || "";
    translated = splitSentence(translated);
    translated = cleanText(translated);

    if(translated.length >= 1){
      addSubtitle(translated);
      setStatus("완료");
    }else{
      setStatus("번역 결과 없음");
    }
  }catch(e){
    console.log("translate error:", e);
    addSubtitle("번역 오류");
    setStatus("번역 실패");
  }

  busy = false;
}

function addSubtitle(text){
  const box = document.getElementById("subtitleBox");

  const div = document.createElement("div");
  div.className = "subtitle";
  div.innerText = text;

  box.appendChild(div);

  while(box.children.length > MAX_SUBTITLES){
    box.removeChild(box.firstChild);
  }

  box.scrollTop = box.scrollHeight;
}

function clearSubtitle(){
  document.getElementById("subtitleBox").innerHTML = "";
  lastSentence = "";
  setStatus("대기중");
}
</script>

</body>
</html>
