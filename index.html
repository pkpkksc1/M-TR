<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>수저우 추천 아파트 위치도</title>

<style>
*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
background:#f4f6fb;
color:#1f2937;
}

.topbar{
background:#fff;
border-bottom:1px solid #e5e7eb;
padding:20px 24px;
}

.topbar h1{
margin:0 0 6px;
font-size:28px;
}

.topbar p{
margin:0;
color:#6b7280;
font-size:14px;
}

.wrap{
display:grid;
grid-template-columns:1.4fr 1fr;
gap:20px;
padding:20px;
}

.panel{
background:#fff;
border:1px solid #e5e7eb;
border-radius:18px;
overflow:hidden;
}

.map-box{
position:relative;
width:100%;
aspect-ratio:16/9;
background:#edf2ff;
}

.map-box img{
width:100%;
height:100%;
object-fit:contain;
display:block;
}

#markerLayer{
position:absolute;
inset:0;
}

.marker{
position:absolute;
transform:translate(-50%,-100%);
border:0;
background:#ef4444;
color:#fff;
border-radius:999px;
padding:5px 7px;
font-size:10px;
font-weight:700;
cursor:pointer;
border:2px solid #fff;
}

.marker.active{
background:#2563eb;
}

.side{
display:flex;
flex-direction:column;
gap:20px;
}

.section{
padding:18px;
}

.section h2{
margin:0 0 14px;
font-size:20px;
}

.empty{
padding:16px;
background:#f8fafc;
border-radius:12px;
color:#6b7280;
font-size:14px;
}

.community-card h3{
margin:0 0 8px;
font-size:22px;
display:flex;
flex-wrap:wrap;
align-items:center;
gap:8px;
}

.name-cn{
padding:4px 8px;
font-size:12px;
border-radius:999px;
background:#dbeafe;
color:#1d4ed8;
}

.copy-btn{
border:0;
background:#2563eb;
color:#fff;
padding:6px 10px;
border-radius:999px;
font-size:12px;
font-weight:700;
cursor:pointer;
}

.meta-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:10px;
}

.meta-grid div{
background:#f8fafc;
border-radius:12px;
padding:10px;
font-size:14px;
}

.community-list{
display:flex;
flex-direction:column;
gap:10px;
}

.community-item{
border:1px solid #e5e7eb;
border-radius:12px;
padding:12px;
cursor:pointer;
}

.community-item.active{
border-color:#2563eb;
background:#eff6ff;
}

.listing-list{
display:flex;
flex-direction:column;
gap:12px;
}

.listing-card{
border:1px solid #e5e7eb;
border-radius:14px;
padding:14px;
}

.listing-card h4{
margin:0 0 8px;
}

.row{
display:flex;
flex-wrap:wrap;
gap:10px;
font-size:14px;
color:#374151;
}

@media(max-width:1100px){
.wrap{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<header class="topbar">
<h1>수저우 추천 아파트 위치도</h1>
<p>실시간 연동 없이 현재 기준으로 정리한 고정 데이터 버전이다.</p>
</header>

<main class="wrap">

<section class="panel">
<div class="map-box">
<img src="./map.jpeg.PNG">
<div id="markerLayer"></div>
</div>
</section>

<section class="side">

<div class="panel section">
<h2>단지 정보</h2>
<div id="communityDetail" class="empty">
지도에서 단지를 선택해줘.
</div>
</div>

<div class="panel section">
<h2>단지 목록</h2>
<div id="communityList" class="community-list"></div>
</div>

<div class="panel section">
<h2>매물 리스트</h2>
<div id="listingList" class="listing-list"></div>
</div>

</section>

</main>

<script>

const COMMUNITIES=[
{
id:"linglongwan",
nameKo:"링롱완",
nameCn:"玲珑湾",
district:"수저우 SIP",
rentRange:"15000~18000 RMB",
size:"120~180㎡",
rooms:"2~3룸",
x:22,y:28,
note:"금계호 서쪽 주재원 거주 단지",
listings:[
{title:"玲珑湾 3室2厅",price:16000,area:"145㎡",rooms:"3室2厅"},
{title:"玲珑湾 湖景房",price:17500,area:"158㎡",rooms:"3室2厅"}
]
},
{
id:"tianyu",
nameKo:"천위",
nameCn:"天域",
district:"수저우 SIP",
rentRange:"15000~20000 RMB",
size:"150~200㎡",
rooms:"3~4룸",
x:10,y:42,
note:"가족형 고급 단지",
listings:[
{title:"天域 精装3房",price:16800,area:"160㎡",rooms:"3室2厅"}
]
},
{
id:"marina",
nameKo:"마리나코브",
nameCn:"水巷邻里",
district:"수저우 SIP",
rentRange:"16000~18000 RMB",
size:"130~160㎡",
rooms:"3룸",
x:28,y:76,
note:"금계호 남서쪽",
listings:[
{title:"水巷邻里 3室2厅",price:17000,area:"144㎡",rooms:"3室2厅"}
]
}
];

const markerLayer=document.getElementById("markerLayer");
const communityList=document.getElementById("communityList");
const communityDetail=document.getElementById("communityDetail");
const listingList=document.getElementById("listingList");

function copyText(text){
navigator.clipboard.writeText(text);
}

function selectCommunity(id){

const c=COMMUNITIES.find(v=>v.id===id);

communityDetail.innerHTML=`
<div class="community-card">
<h3>
${c.nameKo}
<span class="name-cn">${c.nameCn}</span>
<button class="copy-btn" onclick="copyText('${c.nameCn}')">복사</button>
</h3>

<div>${c.note}</div>

<div class="meta-grid">
<div><b>지역</b><br>${c.district}</div>
<div><b>월세대</b><br>${c.rentRange}</div>
<div><b>평형</b><br>${c.size}</div>
<div><b>구조</b><br>${c.rooms}</div>
</div>
</div>
`;

listingList.innerHTML="";

c.listings.forEach(v=>{
const el=document.createElement("div");
el.className="listing-card";
el.innerHTML=`
<h4>${v.title}</h4>
<div class="row">
<span><b>월세</b> ${v.price} RMB</span>
<span><b>면적</b> ${v.area}</span>
<span><b>구조</b> ${v.rooms}</span>
</div>
`;
listingList.appendChild(el);
});
}

COMMUNITIES.forEach(c=>{

const m=document.createElement("button");
m.className="marker";
m.innerText=c.nameKo;
m.style.left=c.x+"%";
m.style.top=c.y+"%";
m.onclick=()=>selectCommunity(c.id);
markerLayer.appendChild(m);

const li=document.createElement("div");
li.className="community-item";
li.innerHTML=`<strong>${c.nameKo} (${c.nameCn})</strong>`;
li.onclick=()=>selectCommunity(c.id);
communityList.appendChild(li);

});

selectCommunity(COMMUNITIES[0].id);

</script>

</body>
</html>
