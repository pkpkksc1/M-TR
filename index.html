<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>수저우 주재원 아파트 지도</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: #f4f6fb;
      color: #1f2937;
    }
    .topbar {
      background: #ffffff;
      border-bottom: 1px solid #e5e7eb;
      padding: 20px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar h1 {
      margin: 0 0 6px;
      font-size: 28px;
    }
    .topbar p {
      margin: 0;
      color: #6b7280;
      font-size: 14px;
    }
    .wrap {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 20px;
      padding: 20px;
    }
    .panel {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      overflow: hidden;
    }
    .map-box {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #edf2ff;
    }
    .map-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    #markerLayer {
      position: absolute;
      inset: 0;
    }
    .marker {
      position: absolute;
      transform: translate(-50%, -100%);
      border: 0;
      background: #ef4444;
      color: #fff;
      border-radius: 999px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 8px 20px rgba(0,0,0,.15);
      border: 2px solid #fff;
    }
    .marker.active {
      background: #2563eb;
    }

    .side {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .section {
      padding: 18px;
    }
    .section h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .empty {
      padding: 16px;
      background: #f8fafc;
      border-radius: 12px;
      color: #6b7280;
      font-size: 14px;
    }

    .community-card h3 {
      margin: 0 0 8px;
      font-size: 22px;
    }
    .name-cn {
      display: inline-block;
      margin-left: 8px;
      padding: 4px 8px;
      font-size: 12px;
      border-radius: 999px;
      background: #dbeafe;
      color: #1d4ed8;
      vertical-align: middle;
    }
    .note {
      color: #4b5563;
      margin-bottom: 12px;
      line-height: 1.5;
    }
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .meta-grid > div {
      background: #f8fafc;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1.45;
    }

    .link-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }
    .btn-link {
      display: inline-block;
      text-decoration: none;
      background: #2563eb;
      color: #fff;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: end;
      margin-bottom: 14px;
    }
    .toolbar label {
      display: flex;
      flex-direction: column;
      gap: 6px;
      font-size: 13px;
      color: #374151;
    }
    .toolbar input {
      width: 120px;
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 14px;
    }
    .toolbar button {
      border: 0;
      background: #111827;
      color: #fff;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
    }

    .listing-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .listing-card {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;
      background: #fff;
    }
    .listing-card h4 {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.4;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 8px;
      font-size: 14px;
      color: #374151;
    }
    .listing-card a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }
    .small {
      color: #6b7280;
      font-size: 13px;
    }

    .community-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .community-item {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      background: #fff;
    }
    .community-item.active {
      border-color: #2563eb;
      background: #eff6ff;
    }
    .community-item strong {
      display: block;
      margin-bottom: 4px;
    }
    .community-item span {
      font-size: 13px;
      color: #6b7280;
    }

    @media (max-width: 1100px) {
      .wrap {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width: 720px) {
      .meta-grid {
        grid-template-columns: 1fr;
      }
      .toolbar input {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  </header>

  <main class="wrap">

      </div>

      <div class="panel section">

        <div id="communityList" class="community-list"></div>
      </div>

      <div class="panel section">
        <h2>매물 리스트</h2>

        <div class="toolbar">
          <label>
            최소 월세

          </label>
          <label>

          <button id="applyBtn">필터 적용</button>

        <div id="listingInfo" class="small">단지를 선택하면 해당 단지 매물을 보여준다.</div>

        searchUrl: "https://m.anjuke.com/su/zujin/?kw=" + encodeURIComponent("苏州国际金融中心 苏州 租房"),

    const markerLayer = document.getElementById("markerLayer");
    const communityDetail = document.getElementById("communityDetail");
    const communityList = document.getElementById("communityList");
    const listingList = document.getElementById("listingList");
    const listingInfo = document.getElementById("listingInfo");
    const minPriceInput = document.getElementById("minPrice");
    const maxPriceInput = document.getElementById("maxPrice");
    const applyBtn = document.getElementById("applyBtn");

    let selectedId = null;

    function priceText(v) {
      return Number(v).toLocaleString("ko-KR") + " RMB";
    }

    function getSelectedCommunity() {
      return COMMUNITIES.find(c => c.id === selectedId) || null;
    }

    function getFilteredListings(community) {
      const min = Number(minPriceInput.value || 0);
      const max = Number(maxPriceInput.value || 99999999);

      return (community.listings || []).filter(item => {
        const p = Number(item.price || 0);
        return p >= min && p <= max;
      });
    }

    function renderCommunityDetail(community) {
      communityDetail.className = "";
      communityDetail.innerHTML = `
        <div class="community-card">
          <h3>
            ${community.nameKo}
            <span class="name-cn">${community.nameCn}</span>
          </h3>
          <div class="note">${community.note}</div>

          <div class="meta-grid">
            <div><strong>지역</strong><br>${community.district}</div>
            <div><strong>월세대</strong><br>${community.rentRange}</div>
            <div><strong>평형</strong><br>${community.size}</div>
            <div><strong>구조</strong><br>${community.rooms}</div>
          </div>

          <div class="link-row">
            <a class="btn-link" href="${community.searchUrl}" target="_blank" rel="noreferrer">안주커 검색 페이지</a>
          </div>
        </div>
      `;
    }

    function renderListings(community) {
      const items = getFilteredListings(community);
      listingList.innerHTML = "";

      if (!items.length) {
        listingInfo.textContent = "현재 필터 조건에 맞는 저장 매물이 없다.";
        listingList.innerHTML = `<div class="empty">조건에 맞는 매물이 없다.</div>`;
        return;
      }

      listingInfo.textContent = `${community.nameKo} 기준 ${items.length}개 저장 매물`;

      items.forEach(item => {
        const el = document.createElement("div");
        el.className = "listing-card";
        el.innerHTML = `
          <h4>${item.title}</h4>
          <div class="row">
            <span><strong>월세:</strong> ${priceText(item.price)}</span>
            <span><strong>면적:</strong> ${item.area}</span>
            <span><strong>구조:</strong> ${item.rooms}</span>
            <span><strong>층수:</strong> ${item.floor}</span>
          </div>
          <div class="row">
            <span><strong>데이터:</strong> ${item.source}</span>
          </div>
          <a href="${item.link}" target="_blank" rel="noreferrer">외부 링크 보기</a>
        `;
        listingList.appendChild(el);
      });
    }

    function setActiveUI() {
      document.querySelectorAll(".marker").forEach(el => {
        el.classList.toggle("active", el.dataset.id === selectedId);
      });

      document.querySelectorAll(".community-item").forEach(el => {
        el.classList.toggle("active", el.dataset.id === selectedId);
      });
    }

    function selectCommunity(id) {
      selectedId = id;
      const community = getSelectedCommunity();
      if (!community) return;
      setActiveUI();
      renderCommunityDetail(community);
      renderListings(community);
    }

    function createMarkers() {
      markerLayer.innerHTML = "";
      COMMUNITIES.forEach(community => {
        const btn = document.createElement("button");
        btn.className = "marker";
        btn.dataset.id = community.id;
        btn.textContent = community.nameKo;
        btn.style.left = community.x + "%";
        btn.style.top = community.y + "%";
        btn.addEventListener("click", () => selectCommunity(community.id));
        markerLayer.appendChild(btn);
      });
    }

    function createCommunityList() {
      communityList.innerHTML = "";
      COMMUNITIES.forEach(community => {
        const item = document.createElement("div");
        item.className = "community-item";
        item.dataset.id = community.id;
        item.innerHTML = `
          <strong>${community.nameKo} (${community.nameCn})</strong>
          <span>${community.district} · ${community.rentRange}</span>
        `;
        item.addEventListener("click", () => selectCommunity(community.id));
        communityList.appendChild(item);
      });
    }

    applyBtn.addEventListener("click", () => {
      const community = getSelectedCommunity();
      if (community) renderListings(community);
    });

    createMarkers();
    createCommunityList();
    selectCommunity(COMMUNITIES[0].id);
  </script>
</body>
