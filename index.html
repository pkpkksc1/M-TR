<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 실시간 통역 mobile verM1</title>

<style>
body{
  background:#000;
  color:#fff;
  font-family:Arial, sans-serif;
  margin:0;
  overflow:hidden;
}

#header{
  position:fixed;
  top:12px;
  left:12px;
  right:12px;
  z-index:10;
}

#title{
  font-size:18px;
  font-weight:bold;
  color:#fff;
}

#version{
  color:#00FF9C;
  margin-left:6px;
}

#status{
  margin-top:8px;
  font-size:15px;
  color:#ddd;
}

#controls{
  margin-top:12px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

#controls button{
  flex:1;
  min-width:90px;
  font-size:20px;
  padding:14px 16px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

#startBtn{
  background:#00FF9C;
  color:#000;
}

#stopBtn{
  background:#ff4d4d;
  color:#fff;
}

#clearBtn{
  background:#555;
  color:#fff;
}

#subtitleBox{
  position:absolute;
  top:140px;
  bottom:0;
  left:0;
  right:0;
  overflow-y:auto;
  padding:16px;
  box-sizing:border-box;
  text-align:center;
}

.subtitle{
  font-size:30px;
  color:#00FF9C;
  font-weight:bold;
  max-width:95%;
  margin:14px auto;
  line-height:1.45;
  word-break:keep-all;
  white-space:pre-line;
}
</style>
</head>

<body>

<div id="header">
  <div id="title">
    🎤 AI 실시간 통역 <span id="version">verM1</span>
  </div>

  <div id="status">🟢 대기중</div>

  <div id="controls">
    <button id="startBtn" onclick="start()">시작</button>
    <button id="stopBtn" onclick="stop()">중지</button>
    <button id="clearBtn" onclick="clearSubtitle()">초기화</button>
  </div>
</div>

<div id="subtitleBox"></div>

<script>
let recognition;
let running = false;
let translating = false;
let lastSentence = "";
let queue = [];

const MAX_SUBTITLES = 6;
const MIN_SENTENCE_LENGTH = 5;

function cleanText(text){
  return text
    .replace(/^(啊|嗯|哦|这个|那个|然后|所以|就是|음|아|어|그|저기)+/g, "")
    .replace(/[.,!?。，！？…—-]/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

function splitSentence(text){
  if(text.length > 24){
    text = text.replace(/(그리고|하지만|그래서|또|또한)/g, "\n$1");
  }
  return text;
}

function start(){
  if(running) return;

  const SpeechRecognitionClass = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognitionClass){
    alert("이 브라우저에서는 음성 인식을 지원하지 않아요.");
    return;
  }

  running = true;
  document.getElementById("status").innerText = "🔴 통역중";

  recognition = new SpeechRecognitionClass();
  recognition.lang = "zh-CN";
  recognition.continuous = true;
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.start();

  recognition.onresult = function(event){
    let sentence = event.results[event.results.length - 1][0].transcript;

    sentence = cleanText(sentence);

    if(sentence.length < MIN_SENTENCE_LENGTH) return;
    if(sentence === lastSentence) return;

    lastSentence = sentence;
    queue.push(sentence);
    processQueue();
  };

  recognition.onend = function(){
    if(running){
      try{
        recognition.start();
      }catch(e){}
    }
  };

  recognition.onerror = function(){
    // 모바일에서는 상태 문구 과하게 바꾸지 않음
  };
}

function stop(){
  running = false;

  if(recognition){
    try{
      recognition.stop();
    }catch(e){}
  }

  document.getElementById("status").innerText = "🟢 대기중";
}

async function processQueue(){
  if(translating) return;
  if(queue.length === 0) return;

  translating = true;
  const text = queue.shift();

  try{
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=zh-CN&tl=ko&dt=t&q=${encodeURIComponent(text)}`;
    const res = await fetch(url);
    const data = await res.json();

    let translated = data?.[0]?.map(item => item[0]).join("") || "";
    translated = splitSentence(translated);
    translated = cleanText(translated);

    if(translated.length >= 2){
      addSubtitle(translated);
    }
  }catch(e){
    addSubtitle("번역 오류");
  }

  translating = false;
  processQueue();
}

function addSubtitle(text){
  const box = document.getElementById("subtitleBox");

  const div = document.createElement("div");
  div.className = "subtitle";
  div.innerText = text;

  box.appendChild(div);

  while(box.children.length > MAX_SUBTITLES){
    box.removeChild(box.firstChild);
  }

  box.scrollTop = box.scrollHeight;
}

function clearSubtitle(){
  document.getElementById("subtitleBox").innerHTML = "";
  queue = [];
  lastSentence = "";
}
</script>

</body>
</html>
